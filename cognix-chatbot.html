<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognix — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6fff;
    --accent2: #ff6f9c;
    --text: #e8e8f0;
    --text-dim: #888899;
    --user-bubble: #1e1a3a;
    --ai-bubble: #141420;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 18px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,111,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 90%, rgba(255,111,156,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(16px);
  }

  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  header h1 span { color: var(--accent); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3ddc84;
    box-shadow: 0 0 8px #3ddc84;
    animation: pulse 2s ease-in-out infinite;
    margin-left: auto;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── API KEY SETUP ── */
  #setup-panel {
    position: relative;
    z-index: 10;
    margin: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #setup-panel label {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  #api-key-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  #api-key-input:focus { border-color: var(--accent); }
  #api-key-input::placeholder { color: var(--text-dim); }

  .save-btn {
    background: linear-gradient(135deg, var(--accent), #9b8fff);
    border: none;
    color: #fff;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .save-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .save-btn:active { transform: translateY(0); }

  .key-saved {
    font-size: 12px;
    color: #3ddc84;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── CHAT AREA ── */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    z-index: 5;
    scroll-behavior: smooth;
  }
  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-track { background: transparent; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── WELCOME ── */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex: 1;
    padding: 32px 20px;
    text-align: center;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  #welcome .gem-icon {
    font-size: 52px;
    filter: drop-shadow(0 0 20px rgba(124,111,255,0.5));
  }
  #welcome h2 {
    font-family: var(--font-head);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  #welcome h2 span { 
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #welcome p { color: var(--text-dim); font-size: 13px; max-width: 300px; line-height: 1.7; }

  .suggestion-chips {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); background: var(--surface2); }

  /* ── MESSAGES ── */
  .msg {
    display: flex;
    gap: 12px;
    animation: slideIn 0.25s ease;
    max-width: 100%;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 15px;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.ai .avatar { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    max-width: min(75%, 560px);
    padding: 13px 16px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.75;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,111,255,0.25);
    border-bottom-right-radius: 4px;
  }
  .msg.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* Markdown-like formatting in bubbles */
  .bubble strong { color: var(--accent); font-weight: 600; }
  .bubble em { color: var(--text-dim); font-style: italic; }
  .bubble code {
    background: rgba(124,111,255,0.12);
    border: 1px solid rgba(124,111,255,0.2);
    padding: 2px 6px; border-radius: 5px;
    font-family: var(--font-mono); font-size: 12px;
    color: #c4bbff;
  }
  .bubble pre {
    background: #0d0d18;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
    font-size: 12px;
    line-height: 1.6;
    color: #b8ffc8;
  }
  .bubble pre code { background: none; border: none; padding: 0; color: inherit; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble p + p { margin-top: 8px; }
  .bubble h1,.bubble h2,.bubble h3 {
    font-family: var(--font-head);
    color: var(--accent);
    margin: 10px 0 4px;
  }

  /* Typing indicator */
  .typing {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 16px;
  }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; background: #9b8fff; }
  .typing span:nth-child(3) { animation-delay: 0.4s; background: var(--accent2); }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* Error */
  .error-bubble {
    background: rgba(255,80,80,0.08);
    border: 1px solid rgba(255,80,80,0.25);
    color: #ff8080;
    font-size: 12.5px;
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  /* ── INPUT BAR ── */
  #input-area {
    position: relative;
    z-index: 10;
    padding: 12px 20px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }
  .input-row {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.6;
    padding: 4px 0;
  }
  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: #fff; font-size: 16px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
    align-self: flex-end;
  }
  #send-btn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 0.3px;
  }

  /* Model badge */
  .model-badge {
    margin-left: auto;
    font-size: 10px;
    background: rgba(124,111,255,0.12);
    border: 1px solid rgba(124,111,255,0.25);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">✦</div>
  <h1>Cogni<span>x</span></h1>
  <span class="model-badge">cognix · gemini-2.0</span>
  <div class="status-dot" id="status-dot" title="Ready"></div>
  <button class="clear-btn" onclick="clearChat()">clear</button>
</header>

<!-- API Key Setup -->
<div id="setup-panel">
  <label>API KEY</label>
  <input type="password" id="api-key-input" placeholder="Paste your Gemini API key here..."  autocomplete="off" />
  <button class="save-btn" onclick="saveKey()">Save Key</button>
</div>

<!-- Chat -->
<div id="chat-container">
  <div id="welcome">
    <div class="gem-icon">✦</div>
    <h2>Hi, I'm <span>Cognix</span></h2>
    <p>Your intelligent AI assistant, powered by Gemini 2.0 Flash.</p>
    <div class="suggestion-chips">
      <div class="chip" onclick="sendChip(this)">Explain quantum computing</div>
      <div class="chip" onclick="sendChip(this)">Write a Python script</div>
      <div class="chip" onclick="sendChip(this)">What is machine learning?</div>
      <div class="chip" onclick="sendChip(this)">Tell me a fun fact</div>
    </div>
  </div>
</div>

<!-- Input -->
<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask Cognix anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
  </div>
  <p class="input-hint">Enter to send · Shift+Enter for new line</p>
</div>

<div id="toast"></div>

<script>
  // ── State ──
  let apiKey = localStorage.getItem('gemini_api_key') || '';
  let chatHistory = []; // [{role: 'user'|'model', parts: [{text}]}]
  let isLoading = false;

  // ── Init ──
  window.onload = () => {
    if (apiKey) showKeySaved();
    document.getElementById('user-input').focus();
  };

  // ── API Key ──
  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) { showToast('⚠ Please enter an API key'); return; }
    if (!val.startsWith('AIza')) { showToast('⚠ Invalid key format — should start with AIza'); return; }
    apiKey = val;
    localStorage.setItem('gemini_api_key', val);
    showKeySaved();
    showToast('✓ API key saved!');
  }

  function showKeySaved() {
    const panel = document.getElementById('setup-panel');
    panel.innerHTML = `
      <span class="key-saved">✓ API key loaded — ready to chat</span>
      <button class="save-btn" onclick="resetKey()" style="margin-left:auto;background:var(--surface2);border:1px solid var(--border);color:var(--text-dim)">Change</button>
    `;
  }

  function resetKey() {
    apiKey = '';
    localStorage.removeItem('gemini_api_key');
    const panel = document.getElementById('setup-panel');
    panel.innerHTML = `
      <label>API KEY</label>
      <input type="password" id="api-key-input" placeholder="Paste your Gemini API key here..."  autocomplete="off" />
      <button class="save-btn" onclick="saveKey()">Save Key</button>
    `;
  }

  // ── Send ──
  async function sendMessage(text) {
    if (!apiKey) { showToast('⚠ Please save your API key first'); return; }
    if (isLoading) return;

    const input = document.getElementById('user-input');
    const msg = (text || input.value).trim();
    if (!msg) return;

    input.value = '';
    autoResize(input);
    hideWelcome();
    isLoading = true;
    setStatus('thinking');
    document.getElementById('send-btn').disabled = true;

    // Add user message
    appendMessage('user', msg);
    chatHistory.push({ role: 'user', parts: [{ text: msg }] });

    // Typing indicator
    const typingId = appendTyping();

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: chatHistory,
            generationConfig: {
              temperature: 0.85,
              topK: 40,
              topP: 0.95,
              maxOutputTokens: 2048
            },
            safetySettings: [
              { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_MEDIUM_AND_ABOVE' },
              { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_MEDIUM_AND_ABOVE' }
            ]
          })
        }
      );

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;

      if (!reply) throw new Error('Empty response from Cognix');

      removeTyping(typingId);
      appendMessage('ai', reply);
      chatHistory.push({ role: 'model', parts: [{ text: reply }] });

    } catch (err) {
      removeTyping(typingId);
      appendError(err.message);
    } finally {
      isLoading = false;
      setStatus('ready');
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  function sendChip(el) { sendMessage(el.textContent); }

  // ── DOM helpers ──
  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMessage(role, text) {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '👤' : '✦'}</div>
      <div class="bubble">${renderMarkdown(text)}</div>
    `;
    container.appendChild(div);
    scrollBottom();
    return div;
  }

  function appendTyping() {
    const container = document.getElementById('chat-container');
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = id;
    div.innerHTML = `
      <div class="avatar">✦</div>
      <div class="bubble typing"><span></span><span></span><span></span></div>
    `;
    container.appendChild(div);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  function appendError(msg) {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.innerHTML = `<div class="error-bubble">⚠ <div><strong>Error:</strong> ${msg}<br><small>Check your API key or network connection.</small></div></div>`;
    container.appendChild(div);
    scrollBottom();
  }

  function scrollBottom() {
    const c = document.getElementById('chat-container');
    setTimeout(() => c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' }), 50);
  }

  // ── Markdown renderer ──
  function renderMarkdown(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.trim()}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/^\* (.+)$/gm, '<li>$1</li>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      .replace(/\n\n+/g, '</p><p>')
      .replace(/^(?!<[hup]|<li|<pre)(.+)$/gm, '$1')
      .replace(/\n/g, '<br>');
  }

  // ── Clear ──
  function clearChat() {
    chatHistory = [];
    const c = document.getElementById('chat-container');
    c.innerHTML = `
      <div id="welcome">
        <div class="gem-icon">✦</div>
        <h2>Hi, I'm <span>Cognix</span></h2>
        <p>Your intelligent AI assistant, powered by Gemini 2.0 Flash.</p>
        <div class="suggestion-chips">
          <div class="chip" onclick="sendChip(this)">Explain quantum computing</div>
          <div class="chip" onclick="sendChip(this)">Write a Python script</div>
          <div class="chip" onclick="sendChip(this)">What is machine learning?</div>
          <div class="chip" onclick="sendChip(this)">Tell me a fun fact</div>
        </div>
      </div>`;
    showToast('Chat cleared');
  }

  // ── Status ──
  function setStatus(state) {
    const dot = document.getElementById('status-dot');
    if (state === 'thinking') {
      dot.style.background = '#ffb800';
      dot.style.boxShadow = '0 0 8px #ffb800';
    } else {
      dot.style.background = '#3ddc84';
      dot.style.boxShadow = '0 0 8px #3ddc84';
    }
  }

  // ── Utils ──
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
